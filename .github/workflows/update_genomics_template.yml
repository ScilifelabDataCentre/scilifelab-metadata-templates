name: Update the genomics template

on:
  schedule:
    - cron:  '0 9 10 * *' # 09:00 UTC on the 10th of every month
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - name: Set up Python 3.12
      uses: actions/setup-python@v6
      with:
        python-version: 3.12
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        python -m pip install -e ".[genomics]"

    - name: Run template
      run: python -m scilifelab_metadata_templates.genomics.generate_genomics_template

    - name: Show differences
      run: 'git diff --stat'
    - name: Create Pull Request
      id: cpr
      uses: peter-evans/create-pull-request@v8
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        commit-message: Update genomics template 
        title: 'Automatic update to the genomics template based on ENAs controlled vocabularies'
        body: |
          This PR is automatically generated based on changes in the genomics template files after having pull the controlled vocabularies from ENA.

          Please verify if these changes are valid.
        labels: |
          automatic PR
        reviewers: somathias YvonneKallberg
        branch: genomics-template-update-${{ github.run_id }}
        base: main

    - name: Check output
      run: |
        echo "Pull Request Number - ${{ steps.cpr.outputs.pull-request-number }}"